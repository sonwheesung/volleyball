<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:," />
<title>배구 — 엔진 테스트 콘솔</title>
<style>
  :root {
    --ink:#15202B; --soft:#8A94A6; --line:#E6EAF0; --paper:#FFFFFF; --bg:#F4F7FB;
    --accent:#10B9A6; --good:#16B07D; --warn:#F2A93B; --bad:#FF6B5A; --alt:#EEF1F6;
    --radius:10px; --shadow:0 1px 3px rgba(27,42,74,.06);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; }
  body { font-family: system-ui, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; background:var(--bg); color:var(--ink); font-size:14px; line-height:1.45; }
  header { padding:16px 24px; border-bottom:1px solid var(--line); background:var(--paper); }
  header h1 { margin:0; font-size:19px; }
  header .sub { color:var(--soft); font-size:12.5px; margin-top:3px; }
  .wrap { max-width:980px; margin:0 auto; padding:20px 24px 80px; }
  .card { border:1px solid var(--line); border-radius:var(--radius); background:var(--paper); padding:16px; box-shadow:var(--shadow); margin-bottom:18px; }

  .teams { display:flex; align-items:center; gap:14px; }
  .team { flex:1; border:1px solid var(--line); border-radius:var(--radius); background:var(--alt); padding:12px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .team .badge { font-size:11px; font-weight:800; color:#fff; padding:3px 10px; border-radius:99px; }
  .team.A .badge { background:var(--good); } .team.B .badge { background:var(--bad); }
  .team select { flex:1; min-width:90px; padding:8px 10px; border:1px solid var(--line); border-radius:7px; background:#fff; font-size:14px; font-weight:700; }
  .team .ovr { font-size:12px; font-weight:800; color:var(--accent); }
  .vs { font-weight:900; color:var(--soft); }

  .run-row { display:flex; align-items:flex-end; gap:14px; margin-top:14px; flex-wrap:wrap; }
  .run-row label { display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--soft); font-weight:700; }
  .run-row input { width:96px; padding:9px 11px; border:1px solid var(--line); border-radius:7px; font-size:14px; }
  #run { margin-left:auto; padding:11px 28px; border:none; background:var(--accent); color:#fff; border-radius:8px; font-weight:800; font-size:15px; cursor:pointer; box-shadow:var(--shadow); }
  #run:hover { filter:brightness(1.07); }
  .hint { color:var(--soft); font-size:12.5px; margin:10px 2px 0; }
  .warn { color:var(--bad); font-weight:700; }

  .scoreboard { display:flex; align-items:center; justify-content:center; gap:22px; padding:8px 0 14px; }
  .sb-team { font-size:16px; font-weight:800; color:var(--soft); flex:1; text-align:center; }
  .sb-team.won { color:var(--ink); }
  .sb-score { font-size:34px; font-weight:900; letter-spacing:1px; }
  .setchips { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; margin-bottom:16px; }
  .setchip { background:var(--alt); border:1px solid var(--line); border-radius:8px; padding:4px 11px; font-size:12.5px; }
  .setchip b { color:var(--soft); font-weight:700; margin-right:4px; }

  .boxes { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:720px){ .boxes{ grid-template-columns:1fr; } .teams{ flex-direction:column; align-items:stretch; } }
  .boxwrap h3 { margin:0 0 8px; font-size:14px; }
  table.box { width:100%; border-collapse:collapse; font-size:12.5px; }
  table.box th { text-align:right; color:var(--soft); font-weight:700; padding:5px 6px; border-bottom:1px solid var(--line); }
  table.box th:nth-child(1), table.box th:nth-child(2) { text-align:left; }
  table.box td { text-align:right; padding:5px 6px; border-bottom:1px solid var(--alt); font-variant-numeric:tabular-nums; }
  table.box td.pos { text-align:center; font-weight:800; font-size:11px; border-radius:5px; }
  td.pos-S{color:#36BE9A;} td.pos-OH{color:#0E9C8C;} td.pos-OP{color:#FF6B5A;} td.pos-MB{color:#8B7CF0;} td.pos-L{color:#C8961F;}
  table.box td.nm { text-align:left; font-weight:700; }
  table.box td.pt { font-weight:900; color:var(--accent); }
  td.empty { text-align:center; color:var(--soft); padding:14px; }

  /* ── 드래프트 라이브 ── */
  .rbadge { display:inline-block; font-size:11px; font-weight:800; padding:1px 7px; border-radius:10px; white-space:nowrap; }
  .rbadge.r-super { background:rgba(242,169,59,.18); color:#C8830F; }
  .rbadge.r-need  { background:rgba(16,185,166,.16); color:var(--accent); }
  .rbadge.r-best  { background:var(--alt); color:var(--soft); }
  .rbadge.r-wish  { background:rgba(139,124,240,.18); color:#6C5CE0; }
  .dl-rank { display:grid; grid-template-columns:repeat(2,1fr); gap:4px 14px; margin-top:10px; }
  .dl-rrow { display:flex; align-items:center; gap:8px; font-size:12.5px; padding:3px 6px; border-bottom:1px solid var(--alt); }
  .dl-rk { color:var(--soft); font-weight:800; width:38px; }
  .dl-tm { flex:1; font-weight:700; }
  .dl-mv { border:1px solid var(--line); background:var(--card,#fff); border-radius:6px; padding:1px 7px; cursor:pointer; font-size:12px; }
  .dl-mv:disabled { opacity:.3; cursor:default; }
  .dl-prog { margin-left:auto; color:var(--soft); font-weight:800; font-size:12.5px; }
  table.dl-tbl td.dl-pk { color:var(--soft); font-weight:800; }
  table.dl-tbl td.dl-tn { text-align:left; font-weight:700; }
  table.dl-tbl tr.dl-last td { background:rgba(16,185,166,.10); }

  /* ── 경기 중계 · 현수막 ── */
  h3.bch { font-size:13.5px; margin:16px 0 7px; color:var(--ink,#1a2230); display:flex; align-items:center; gap:6px; }
  .bcmvp { background:rgba(242,169,59,.10); border:1px solid rgba(242,169,59,.35); border-radius:10px; padding:10px 12px; font-size:13.5px; }
  .bcmvpbadge { background:var(--warn); color:#fff; font-size:11px; font-weight:900; padding:1px 7px; border-radius:7px; letter-spacing:.5px; }
  .bcrecap { color:var(--soft); font-size:12.5px; margin-top:6px; }
  .bcbanner { display:flex; align-items:center; gap:9px; background:var(--card,#fff); border:1px solid var(--line); border-left-width:4px; border-radius:8px; padding:8px 11px; margin-bottom:6px; }
  .bcicon { font-size:16px; }
  .bctitle { flex:1; font-size:13px; font-weight:700; color:var(--ink,#1a2230); }
  .bcmine { background:var(--accent); color:#fff; font-size:10px; font-weight:800; padding:1px 6px; border-radius:6px; }
  .bcsitwrap { max-height:340px; overflow:auto; }
  .bcsit { font-size:12.5px; padding:4px 8px; border-bottom:1px solid var(--alt); color:var(--ink,#1a2230); }

  /* ── 박스스코어(네이버 기록실 스타일) ── */
  .boxwrap h3 { display:flex; align-items:center; gap:8px; }
  .boxwrap h3::before { content:''; width:4px; height:15px; border-radius:2px; background:var(--good); }
  .boxwrap.away h3::before { background:var(--bad); }
  table.bx { width:100%; border-collapse:collapse; font-size:11.5px; }
  table.bx th, table.bx td { white-space:nowrap; }
  table.bx th { color:var(--soft); font-weight:800; padding:5px 3px; }
  table.bx thead tr.grp th { font-size:10.5px; text-transform:uppercase; letter-spacing:.3px; padding:6px 5px 3px; border-bottom:1px solid var(--line); }
  table.bx thead tr.grp th.atkg { color:var(--accent); border-bottom:2px solid var(--accent); }
  table.bx thead tr.sub th { font-size:11px; padding:2px 5px 6px; border-bottom:1px solid var(--line); }
  table.bx th.l, table.bx td.l { text-align:left; }
  table.bx td { text-align:center; padding:5px 3px; border-bottom:1px solid var(--alt); font-variant-numeric:tabular-nums; }
  table.bx tbody tr:hover { background:rgba(16,185,166,.055); }
  table.bx td.nm { text-align:left; font-weight:700; padding-left:7px; }
  table.bx td.sc { font-weight:900; color:var(--ink); background:rgba(16,185,166,.08); }
  table.bx td.rate.hi { color:var(--good); font-weight:800; }
  table.bx td.zero { color:var(--line); }
  table.bx td.er { color:var(--bad); font-weight:700; }
  table.bx tr.tot td { border-top:2px solid var(--line); border-bottom:none; background:var(--alt); font-weight:800; color:var(--ink); padding:7px 5px; }
  .pp { display:inline-block; min-width:25px; text-align:center; font-size:10px; font-weight:800; color:#fff; padding:2px 0; border-radius:5px; }
  .pp-S{background:#2FB48E;} .pp-OH{background:#0E9C8C;} .pp-OP{background:#FF6B5A;} .pp-MB{background:#8B7CF0;} .pp-L{background:#C8961F;}
  table.bx th .eff { font-size:9px; font-weight:700; color:var(--accent); }

  .stat-grid { display:flex; gap:16px; margin-bottom:14px; }
  .stat { flex:1; background:var(--alt); border-radius:var(--radius); padding:14px; text-align:center; }
  .stat .sv { display:block; font-size:24px; font-weight:900; color:var(--accent); }
  .stat .sl { color:var(--soft); font-size:12px; font-weight:700; }
  table.dist { max-width:420px; }
  .loading { text-align:center; padding:48px 16px; color:var(--soft); font-size:13.5px; font-weight:700; }
  .spinner { width:34px; height:34px; margin:0 auto 14px; border:3px solid var(--alt); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  button:disabled { opacity:.55; cursor:default; filter:none !important; }
  .tabs { display:flex; gap:8px; margin:16px 0 0; }
  .tab { padding:8px 18px; border-radius:8px; font-weight:800; font-size:13px; border:1px solid var(--ink); background:var(--accent); color:#fff; }
  .tab.off { background:transparent; color:var(--soft); border:1px dashed var(--line); }
</style>
</head>
<body>
  <header>
    <h1>배구 — 엔진 테스트 콘솔</h1>
    <div class="sub">PC 브라우저에서 경기 엔진을 직접 돌려 결과를 검증 · 백엔드 없음 · <a href="/board-lab.html" style="color:var(--accent);font-weight:700;text-decoration:none">🏐 수비 위치 실험실 →</a></div>
  </header>
  <div class="wrap">
    <div class="tabs" id="tabs"></div>
    <div class="card" id="controls"></div>
    <div class="card" id="out"></div>
  </div>
  <script src="dist/bundle.js"></script>
</body>
</html>
